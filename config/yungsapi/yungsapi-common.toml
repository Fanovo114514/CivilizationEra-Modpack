# ============================================================
# YUNG's API 配置
# ============================================================

[general]
	# 调试模式
	debugMode = false

	# 结构生成倍率
	# 范围: 0.1-3.0
	structureSpawnRate = 1.0

[worldgen]
	# 启用地牢生成
	enableBetterDungeons = true

	# 启用要塞生成
	enableBetterStrongholds = true

	# 启用下界要塞生成
	enableBetterNetherFortresses = true

[balance]
	# 宝箱战利品倍率
	# 范围: 0.5-3.0
	lootMultiplier = 1.0

	# 怪物生成倍率
	# 范围: 0.5-3.0
	mobSpawnMultiplier = 1.0
