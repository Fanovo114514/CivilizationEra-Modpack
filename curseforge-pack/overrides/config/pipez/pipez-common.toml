# ============================================================
# Pipez 高效管道配置
# ============================================================

[general]
	# 物品管道基础传输速度（每tick）
	# 范围: 1-64
	itemPipeSpeed = 8

	# 流体管道基础传输量（每tick，单位mB）
	# 范围: 10-10000
	fluidPipeSpeed = 100

	# 能量管道基础传输量（每tick）
	# 范围: 10-100000
	energyPipeSpeed = 1000

	# 气体管道基础传输量（每tick）
	# 范围: 1-10000
	gasPipeSpeed = 100

	# 管道最大升级等级
	# 范围: 1-5
	maxUpgradeTier = 5

[item_pipe]
	# 物品管道容量
	# 范围: 1-64
	capacity = 16

	# 物品管道过滤槽数量
	# 范围: 1-18
	filterSlots = 9

[fluid_pipe]
	# 流体管道容量
	# 范围: 100-100000
	capacity = 8000

[energy_pipe]
	# 能量管道容量
	# 范围: 1000-1000000
	capacity = 100000

	# 能量管道损耗率
	# 范围: 0-0.1
	lossPerBlock = 0.001

[gas_pipe]
	# 气体管道容量
	# 范围: 100-100000
	capacity = 16000
